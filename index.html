<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>自定义杰佣留言卡片</title>
    <style>
        /* ====================================== */
        /* 全局基础样式 */
        /* ====================================== */
        * {
            margin: 0; /* 清除所有标签默认外边距 */
            padding: 0; /* 清除所有标签默认内边距 */
            box-sizing: border-box; /* 让宽高包含边框和内边距，布局更稳定 */
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; /* 设置全局统一字体 */
        }

        body {
            background-color: #f5f5f5; /* 页面整体背景颜色：浅灰色 */
            padding: 15px; /* 页面整体四周内边距：15像素 */
        }

        /* ====================================== */
        /* 编辑区域样式 */
        /* ====================================== */
        .editor {
            background: #fff; /* 编辑区背景：纯白色 */
            padding: 15px; /* 编辑区内边距：15像素 */
            border-radius: 12px; /* 圆角：12像素 */
            margin-bottom: 15px; /* 编辑区下方外边距：15像素（和预览区隔开） */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); /* 轻微阴影，让卡片有悬浮感 */
        }

        .editor h3 {
            font-size: 18px; /* 标题文字大小：18像素 */
            margin-bottom: 12px; /* 标题下方外边距：12像素 */
            color: #333; /* 标题文字颜色：深灰色 */
            text-align: center; /* 标题文字水平居中 */
        }

        .editor-item {
            margin-bottom: 10px; /* 每个表单项之间的间距：10像素 */
        }

        .editor-item label {
            display: block; /* 让标签独占一行 */
            font-size: 14px; /* 标签文字大小：14像素 */
            color: #666; /* 标签文字颜色：中灰色 */
            margin-bottom: 4px; /* 标签下方间距：4像素 */
        }

        /* ====================================== */
        /* 头像上传区域 */
        /* ====================================== */
        .avatar-upload {
            display: flex; /* 弹性布局：子元素横向排列 */
            align-items: center; /* 子元素垂直居中对齐 */
            gap: 10px; /* 子元素之间的间距：10像素 */
        }

        #avatarInput {
            display: none; /* 隐藏系统默认丑陋的文件选择框 */
        }

        .upload-btn {
            background: #999; /* 按钮背景色：灰色 */
            color: #fff; /* 按钮文字颜色：白色 */
            padding: 6px 12px; /* 按钮内边距：上下6px 左右12px */
            border-radius: 8px; /* 按钮圆角：8像素 */
            font-size: 14px; /* 按钮文字大小：14像素 */
            cursor: pointer; /* 鼠标移上去变成小手样式 */
            border: none; /* 去掉按钮默认边框 */
        }

        .preview-avatar-small {
            width: 40px; /* 小头像宽度：40像素 */
            height: 40px; /* 小头像高度：40像素 */
            border-radius: 50%; /* 50%圆角 → 正圆形 */
            background: #eee; /* 头像默认背景色：浅灰色 */
            object-fit: cover; /* 图片填满容器，不变形裁剪 */
        }

        /* ====================================== */
        /* 输入框 & 文本域样式 */
        /* ====================================== */
        .editor-item input,
        .editor-item textarea {
            width: 100%; /* 宽度占满父容器 */
            padding: 8px 12px; /* 内边距：上下8px 左右12px */
            border: 1px solid #ddd; /* 边框：1像素 浅灰色 */
            border-radius: 8px; /* 圆角：8像素 */
            font-size: 14px; /* 文字大小：14像素 */
            outline: none; /* 去掉点击时默认的蓝色高亮框 */
        }

        .editor-item input:focus,
        .editor-item textarea:focus {
            border-color: #0088ff; /* 点击输入框时，边框变成蓝色 */
        }

        /* ====================================== */
        /* 预览卡片区域 */
        /* ====================================== */
        .preview {
            background: #fff; /* 预览区背景：白色 */
            padding: 20px; /* 预览区内边距：20像素 */
            border-radius: 12px; /* 圆角：12像素 */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); /* 轻微阴影 */
        }

        .message-card {
            display: flex; /* 弹性布局：头像+内容横向排列 */
            align-items: flex-start; /* 子元素顶部对齐 */
            gap: 12px; /* 头像和内容之间的间距：12像素 */
        }

        .avatar {
            width: 60px; /* 大头像宽度：60像素 */
            height: 60px; /* 大头像高度：60像素 */
            border-radius: 50%; /* 正圆形 */
            object-fit: cover; /* 图片填满容器，不变形 */
            background: #eee; /* 头像默认背景 */
        }

        .content {
            flex: 1; /* 内容区域自动占满剩余宽度 */
        }

        .name {
            font-size: 18px; /* 名字文字大小：18像素 */
            font-weight: bold; /* 文字加粗 */
            color: #333; /* 名字颜色：深灰色 */
            margin-bottom: 6px; /* 名字下方间距：6像素 */
        }

        .text {
            font-size: 16px; /* 留言文字大小：16像素 */
            color: #333; /* 留言颜色：深灰色 */
            line-height: 1.4; /* 行高：让文字更舒展 */
            margin-bottom: 10px; /* 留言下方间距：10像素 */
        }

        .footer {
            display: flex; /* 底部三项横向排列 */
            justify-content: space-between; /* 三项自动左右分散对齐 */
            align-items: center; /* 垂直居中 */
            width: 100%; /* 宽度占满 */
            font-size: 14px; /* 底部文字大小：14像素 */
            color: #999; /* 底部文字颜色：浅灰色 */
        }

        /* ====================================== */
        /* 手机小屏幕适配 */
        /* ====================================== */
        @media (max-width: 375px) {
            .avatar {
                width: 50px; /* 小屏幕下缩小头像 */
                height: 50px;
            }
            .name {
                font-size: 16px; /* 小屏幕名字缩小 */
            }
            .text {
                font-size: 14px; /* 小屏幕留言缩小 */
            }
            .footer {
                font-size: 12px; /* 小屏幕底部文字缩小 */
                gap: 15px; /* 底部三项间距加大 */
            }
        }
    </style>
</head>
<body>

    <!-- 编辑区 -->
    <div class="editor">
        <h3>杰佣留言卡片</h3>

        <!-- 头像上传 -->
        <div class="editor-item">
            <label>选择头像：</label>
            <div class="avatar-upload">
                <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">选择相册图片</button>
                <img class="preview-avatar-small" id="smallAvatar" src="./杰克.jpg" alt="预览头像">
                <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar(this)">
            </div>
        </div>

        <div class="editor-item">
            <label>名字：</label>
            <input type="text" id="userName" value="杰克" placeholder="输入名字" oninput="updatePreview()">
        </div>

        <div class="editor-item">
            <label>留言内容：</label>
            <textarea id="messageText" rows="2" placeholder="输入留言内容"
                oninput="updatePreview()">@奈布 一直纠缠下去吧 命运 我和你</textarea>
        </div>

        <div class="editor-item">
            <label>来源：</label>
            <input type="text" id="sourceText" value="来自杰克的留言" placeholder="输入来源" oninput="updatePreview()">
        </div>

        <div class="editor-item">
            <label>时间：</label>
            <input type="text" id="timeText" value="5:20pm" placeholder="输入时间" oninput="updatePreview()">
        </div>

        <div class="editor-item">
            <label>点赞数：</label>
            <input type="text" id="likeNum" value="1314" placeholder="输入点赞数" oninput="updatePreview()">
        </div>
    </div>

    <!-- 预览区 -->
    <div class="preview">
        <div class="message-card">
            <img class="avatar" id="previewAvatar" src="./杰克.jpg" alt="头像">
            <div class="content">
                <div class="name" id="previewName">杰克</div>
                <div class="text" id="previewText">@奈布 一直纠缠下去吧 命运 我和你</div>
                <div class="footer">
                    <span id="previewSource">来自杰克的留言</span>
                    <span id="previewTime">5:20pm</span>
                    <span id="previewLike">点赞1314</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 头像预览函数（选相册图片）
        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 更新小预览图和主预览图
                    document.getElementById('smallAvatar').src = e.target.result;
                    document.getElementById('previewAvatar').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 实时更新留言等信息
        function updatePreview() {
            const userName = document.getElementById('userName').value || '未知用户';
            const messageText = document.getElementById('messageText').value || '请输入留言内容';
            const sourceText = document.getElementById('sourceText').value || '未知来源';
            const timeText = document.getElementById('timeText').value || '未知时间';
            const likeNum = document.getElementById('likeNum').value || 0;

            document.getElementById('previewName').textContent = userName;
            document.getElementById('previewText').textContent = messageText;
            document.getElementById('previewSource').textContent = sourceText;
            document.getElementById('previewTime').textContent = timeText;
            document.getElementById('previewLike').textContent = `点赞${likeNum}`;
        }

        // 初始化加载默认头像
        window.onload = function() {
            if (!document.getElementById('previewAvatar').src) {
                document.getElementById('previewAvatar').src = 'https://picsum.photos/60/60';
                document.getElementById('smallAvatar').src = 'https://picsum.photos/40/40';
            }
        }
    </script>
</body>
</html>
